services:
  aiyo-server:
    build:
      context: .
      dockerfile: packages/aiyo-server/Dockerfile
    image: aiyo-server:latest
    container_name: aiyo-server
    ports:
      - "8080:8080"
    env_file:
      - path: ./.env
        required: false
    environment:
      # Server config
      - AIYO_SERVER_HOST=0.0.0.0
      - AIYO_SERVER_PORT=8080
      # Proxy (optional)
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    volumes:
      # Persist agent work directory and history
      - ./workspace:/workspace
      # Mount local skills directory
      - ./.aiyo:/workspace/.aiyo:ro
    working_dir: /workspace
    restart: unless-stopped

volumes:
  aiyo-workdir:
