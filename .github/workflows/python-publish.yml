name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package-dir: libs/aiyo
          - package-dir: packages/aiyo-cli
          - package-dir: packages/aiyo-server

    steps:
      - uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.15"
          python-version: "3.11"
          enable-cache: true

      - name: Build package
        working-directory: ${{ matrix.package-dir }}
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.package-dir }}/dist
