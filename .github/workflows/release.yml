name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release Linux x86_64
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller

      - name: Build binary
        run: |
          uv run pyinstaller \
            --onefile \
            --name aiyo-linux-x86_64 \
            --collect-all tiktoken \
            --collect-all tiktoken_ext \
            --collect-all trafilatura \
            --collect-all any_llm \
            --hidden-import aiyo_cli.cmd_prompt \
            --hidden-import aiyo_cli.cmd_repl \
            --hidden-import aiyo_cli.ui \
            --hidden-import ext.tools \
            src/aiyo_cli/__main__.py
          ls -lh dist/aiyo-linux-x86_64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
          files: dist/aiyo-linux-x86_64
