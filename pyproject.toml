# AIYO Workspace Configuration
# This is a uv workspace root, not a buildable package

[tool.uv.workspace]
members = ["libs/*", "packages/*"]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "I", "UP"]

[tool.basedpyright]
typeCheckingMode = "off"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
